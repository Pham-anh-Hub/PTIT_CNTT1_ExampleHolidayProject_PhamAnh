spring.application.name=OASIS_System

# Database Settings
spring.datasource.url=jdbc:mysql://localhost:3306/oasis_system_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456789

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Settings
# Chuỗi secret key bảo mật tối thiểu 256-bit (32 bytes) cho HS256
jwt.secret=9a4f2c8d3b7a1e5f8g9h0i1j2k3l4m5n6o7p8q9r0s1t2u3v4w5x6y7z8a9b0c1d
jwt.accessToken-expiration-ms=3600000
jwt.refreshToken-expiration-ms=604800000

# Redis Configurations
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Cloudinary Configurations from environment variables
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
